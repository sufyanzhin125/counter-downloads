        .message-item {
            background: #0a0e16;

            border-radius: 14px;

            padding: 1rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;

        .online-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-left: 5px; }
        .online { background: #10b981; box-shadow: 0 0 5px #10b981; }

        .chat-container {
            height: 450px;
            overflow-y: auto;
            background: #0a0e16;
            border-radius: 20px;
            padding: 1rem;
            margin-bottom: 1rem;

        .chat-message {
            padding: 0.75rem;
            border-radius: 14px;
            margin-bottom: 0.75rem;

        .chat-message:hover { background: #11151f; }

        .delete-btn {
            background: #6b7280;
            padding: 2px 10px;
            font-size: 0.7rem;
            margin-left: 0.5rem;

        .rep-delete-btn {
            background: #dc2626;

        footer {

            padding: 2rem;
            color: #5a637c;
            font-size: 0.75rem;
            border-top: 1px solid #1f2538;
            margin-top: 2rem;
        }

        @media (max-width: 768px) {
            .grid-2 { grid-template-columns: 1fr; }
            .navbar { flex-direction: column; text-align: center; }
            .chat-container { height: 350px; }
        }
    </style>
</head>

    // Auto Rep Messages
    const autoRepMessages = [
        "+REP Trusted seller! 🔥", "+VOUCH Legit config! 💯", "+REP Fast delivery! ⚡",
        "VOUCH +1 Great service! 🌟", "+REP 100% legit! ✅", "Trusted member! 🤝",
        "+VOUCH Highly recommended! 🎯", "REP++ Best config ever! 🚀", "Legit seller! 🔥🔥",
        "+REP Will buy again! 💪", "VOUCH! Working perfectly! 🎮", "Trusted! Fast response! ⏱️",

    ];

    ];

    const availableTags = ['prime', 'premium', 'vip', 'elite', 'legend', 'god', 'hacker'];

    function isValidEmail(email) {
        const emailRegex = /^[^\s@]+@([^\s@]+\.)+[^\s@]+$/;
        return emailRegex.test(email);
    }

    // Update Inbox Badge (Red Dot with Number)
    function updateInboxBadge() {
        const badge = document.getElementById('inboxBadge');
        if (!badge) return;
        if (currentUser) {
            const unreadCount = messages.filter(m => m.to === currentUser.username && !m.read).length;
            if (unreadCount > 0) {
                badge.innerText = unreadCount;
                badge.classList.remove('hidden');
            } else {
                badge.classList.add('hidden');
            }
        } else {
            badge.classList.add('hidden');
        }
    }

    // ============= FIREBASE DATA FUNCTIONS =============
    async function loadAllData() {
        try {
            const usersSnap = await db.collection('users').get();
            users = [];
            usersSnap.forEach(doc => users.push({ id: doc.id, ...doc.data() }));
            
            const postsSnap = await db.collection('posts').orderBy('timestampMs', 'desc').get();
            posts = [];
            postsSnap.forEach(doc => posts.push({ id: doc.id, ...doc.data() }));
            
            const messagesSnap = await db.collection('messages').get();
            messages = [];
            messagesSnap.forEach(doc => messages.push({ id: doc.id, ...doc.data() }));
            
            const tagsSnap = await db.collection('userTags').get();
            userTags = {};
            tagsSnap.forEach(doc => { userTags[doc.id] = doc.data(); });
            
            const chatSnap = await db.collection('chatMessages').orderBy('timestampMs', 'asc').get();
            chatMessages = [];
            chatSnap.forEach(doc => chatMessages.push({ id: doc.id, ...doc.data() }));
            
            const activitySnap = await db.collection('lastActivity').get();
            lastActivity = {};
            activitySnap.forEach(doc => { lastActivity[doc.id] = doc.data().timestamp; });
            
            updateCartCount();
            updateInboxBadge();
            return true;
        } catch (error) {
            console.error("Error loading data:", error);
            return false;
        }
    }
    
    async function saveUser(user) {
        await db.collection('users').doc(user.id).set(user);
    }
    
    async function savePost(post) {
        const docRef = await db.collection('posts').add(post);
        post.id = docRef.id;
        return post;
    }
    
    async function deletePostById(postId) {
        await db.collection('posts').doc(postId).delete();
    }
    
    async function saveMessage(message) {
        const docRef = await db.collection('messages').add(message);
        message.id = docRef.id;
        return message;
    }
    
    async function deleteMessageById(msgId) {
        await db.collection('messages').doc(msgId).delete();
    }
    
    async function saveUserTag(username, tagData) {
        await db.collection('userTags').doc(username).set(tagData);
    }
    
    async function deleteUserTag(username) {
        await db.collection('userTags').doc(username).delete();
    }
    
    async function saveChatMessage(message) {
        const docRef = await db.collection('chatMessages').add(message);
        message.id = docRef.id;
        return message;
    }
    
    async function deleteChatMessageById(messageId) {
        await db.collection('chatMessages').doc(messageId).delete();
    }
    
    async function clearAllChatMessages() {
        const snapshot = await db.collection('chatMessages').get();
        snapshot.forEach(doc => doc.ref.delete());
    }
    
    async function saveLastActivity(username) {
        await db.collection('lastActivity').doc(username).set({ timestamp: Date.now() });
    }
    
    async function loadCurrentUser() {
        const savedUser = localStorage.getItem('currentUser');
        if (savedUser) {
            const userData = JSON.parse(savedUser);
            const userDoc = await db.collection('users').doc(userData.id).get();
            if (userDoc.exists) {
                currentUser = { id: userDoc.id, ...userDoc.data() };
                updateInboxBadge();
                return true;
            }
        }
        return false;
    }

    function updateCartCount() {
        const el = document.getElementById('cartCount');
        if (el) el.innerText = cart.reduce((s, i) => s + i.quantity, 0);
    }
    
    function updateLastActivity() {
        if (currentUser) { 
            lastActivity[currentUser.username] = Date.now(); 
            saveLastActivity(currentUser.username);
        }
    }
    setInterval(updateLastActivity, 30000);
    
    function isOnline(username) {
        return lastActivity[username] && (Date.now() - lastActivity[username]) < 5 * 60 * 1000;
    }

    function getUserTagDisplay(user) {
        if (!user) return '<span class="tag tag-member">MEMBER</span>';
        if (user.isBanned) return '<span class="tag tag-banned">BANNED</span>';
        if (user.isOwner) return '<span class="tag tag-owner">OWNER</span>';
        const tagData = userTags[user.username];
        if (tagData) {
            const tagMap = { prime: 'tag-prime', premium: 'tag-premium', vip: 'tag-vip', elite: 'tag-elite', legend: 'tag-legend', god: 'tag-god', hacker: 'tag-hacker' };
            return `<span class="tag ${tagMap[tagData.tag] || 'tag-member'}">${tagData.tag.toUpperCase()}</span>`;
        }
        return '<span class="tag tag-member">MEMBER</span>';
    }

    function getUserGlowClass(user) {
        if (!user) return '';
        if (user.isBanned) return '';
        if (user.isOwner) return 'glow-name glow-prime';
        const tagData = userTags[user.username];
        if (tagData?.glow) {
            const glowMap = { prime: 'glow-prime', premium: 'glow-premium', vip: 'glow-vip', elite: 'glow-elite', legend: 'glow-legend', god: 'glow-god', hacker: 'glow-hacker' };
            return `glow-name ${glowMap[tagData.tag] || ''}`;
        }
        return '';
    }

    function showToast(msg, isError = false) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.style.borderLeftColor = isError ? '#dc2626' : '#10b981';
        toast.innerHTML = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    function showModal(title, html) {
        let modal = document.getElementById('globalModal');
        if (!modal) {
            modal = document.createElement('div');
            modal.id = 'globalModal';
            modal.className = 'modal';
            modal.innerHTML = `<div class="modal-content"><div id="modalTitle" style="font-size:1.3rem; font-weight:600; margin-bottom:1rem; background:linear-gradient(135deg,#dc2626,#f97316); background-clip:text; -webkit-background-clip:text; color:transparent;"></div><div id="modalBody"></div><button onclick="closeModal()" style="margin-top:1rem;">Close</button></div>`;
            document.body.appendChild(modal);
        }
        document.getElementById('modalTitle').innerText = title;
        document.getElementById('modalBody').innerHTML = html;
        modal.style.display = 'flex';
    }

    window.closeModal = function() {
        const modal = document.getElementById('globalModal');
        if (modal) modal.style.display = 'none';
    };
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });

    function showConfirm(message, onConfirm) {

            username: user.username
        };
        
        const templateParams = {

            username: user.username,
            code: resetCode

    window.completePasswordReset = async function(email) {
        const code = document.getElementById('resetCode')?.value.trim();
        const newPass = document.getElementById('newPassword')?.value;
        const confirmPass = document.getElementById('confirmPassword')?.value;
        
        const resetData = resetCodes[email];
        if (!resetData) {
            showToast('No reset request found. Please request a new code.', true);
            return;
        }
        
        if (Date.now() > resetData.expires) {
            showToast('Reset code has expired. Please request a new one.', true);
            delete resetCodes[email];
            return;
        }
        
        if (code !== resetData.code) {
            showToast('Invalid verification code', true);
            return;
        }
        
        if (!newPass || newPass.length < 4) {
            showToast('Password must be at least 4 characters', true);
            return;
        }
        
        if (newPass !== confirmPass) {
            showToast('Passwords do not match', true);
            return;
        }
        
        const user = users.find(u => u.email === email);
        if (user) {
            user.password = newPass;
            await saveUser(user);
            delete resetCodes[email];
            showToast('Password reset successful! You can now login.');
            closeModal();
            showLoginModal();
        } else {
            showToast('User not found', true);
        }
    };

    // Rate Limiting
    function canSendMessage(username) {
        const user = users.find(u => u.username === username);
        const tag = userTags[username]?.tag || (user?.isOwner ? 'owner' : 'member');
        const now = Date.now();
        
        if (userTimeouts[username] && userTimeouts[username] > now) {
            const remaining = Math.ceil((userTimeouts[username] - now) / 1000);
            showToast(`Timeout: Wait ${remaining} seconds`, true);
            return false;
        }
        
        if (!userMessageCount[username]) userMessageCount[username] = [];
        userMessageCount[username] = userMessageCount[username].filter(t => now - t < 5000);
        
        if (tag === 'member') {
            if (userMessageCount[username].length >= 1) {
                showToast('Please wait 5 seconds between messages', true);
                return false;
            }
        } else {
            if (userMessageCount[username].length >= 5) {
                userTimeouts[username] = now + 120000;
                userMessageCount[username] = [];
                showToast('Spam detected! 2 minute timeout', true);
                return false;
            }
        }
        
        userMessageCount[username].push(now);
        return true;
    }

        container.innerHTML = myPosts.map(post => {

            return `<div class="post"><div class="post-header"><div class="post-user" onclick="showProfile('${post.username}')"><span class="${getUserGlowClass(user || {})}">${post.username}</span>${getUserTagDisplay(user || {})}${post.status === 'completed' ? '<span class="tag tag-prime">DELIVERED</span>' : '<span class="tag tag-member" style="background:#dc2626;">PENDING</span>'}</div><div class="post-time">${post.timestamp}</div>${currentUser?.isOwner || currentUser?.username === post.username ? `<button class="delete-btn" onclick="deletePost(${post.id})">Delete</button>` : ''}</div><div class="post-content">${post.content.replace(/\n/g,'<br>')}</div>${post.image ? `<img src="${post.image}" class="post-image" onclick="window.open(this.src)">` : ''}<div id="replies-${post.id}">${(post.replies || []).map(r => `<div class="reply"><strong class="${getUserGlowClass(users.find(u=>u.username===r.username)||{})}" onclick="showProfile('${r.username}')">${r.username}</strong> ${getUserTagDisplay(users.find(u=>u.username===r.username)||{})}<br>${r.content}</div>`).join('')}</div>${currentUser ? `<div class="reply-box"><textarea id="reply-${post.id}" rows="2" placeholder="Write reply..." onkeypress="handleReplyEnter(event, ${post.id})"></textarea><button onclick="addReply(${post.id})">Reply</button>${currentUser.isOwner ? `<button onclick="markDelivered(${post.id})" style="background:#10b981;">Mark Delivered & Send Key</button>` : ''}</div>` : ''}</div>`;
        }).join('');
    }
    
    window.handleReplyEnter = function(e, postId) {
        if (e.key === 'Enter') { e.preventDefault(); addReply(postId); }
    };
    
    window.showNewPostForm = function() {
        const form = document.getElementById('newPostForm');
        if (form) form.classList.toggle('hidden');
    };
    
    // FIXED: Submit Post Function (Working)
    window.submitPost = async function() {
        const content = document.getElementById('postContent')?.value.trim();
        if (!content) { 
            showToast('Enter payment details', true); 
            return; 
        }
        const file = document.getElementById('postImage').files[0];
        const totalPrice = cart.reduce((s, i) => s + (i.price * i.quantity), 0);
        const orderDetails = cart.map(i => `${i.name} x${i.quantity} ($${i.price * i.quantity})`).join(', ');
        
        // Create auto rep post
        await createAutoOrderPost(currentUser.username);
        
        if (file) {
            const reader = new FileReader();
            reader.onload = async (e) => {
                await savePostFunction(content, e.target.result, orderDetails, totalPrice);
            };
            reader.readAsDataURL(file);
        } else {
            await savePostFunction(content, null, orderDetails, totalPrice);
        }
    };
    
    async function savePostFunction(content, image, orderDetails, totalPrice) {
        const newPost = { 
            username: currentUser.username, 
            userId: currentUser.id, 
            content, 
            image, 
            timestamp: new Date().toLocaleString(), 
            timestampMs: Date.now(),
            replies: [], 
            status: 'pending', 
            orderDetails, 
            totalPrice, 
            isAutoRep: false, 
            isOrderRep: false 
        };
        const saved = await savePost(newPost);
        posts.unshift(saved);
        
        // Send message to owner's inbox
        const newMsg = { 
            from: currentUser.username, 
            to: 'sufyan', 
            content: `🛍️ NEW ORDER!\n\nProduct: ${orderDetails}\nTotal: $${totalPrice}\n\nPayment Details:\n${content.substring(0,300)}${content.length > 300 ? '...' : ''}\n\n${image ? '📸 Screenshot attached below' : 'No screenshot'}`,
            timestamp: new Date().toLocaleString(), 
            read: false, 
            orderId: saved.id, 
            orderDetails: orderDetails, 
            totalPrice: totalPrice, 
            hasImage: !!image, 
            imageData: image 
        };
        const savedMsg = await saveMessage(newMsg);
        messages.push(savedMsg);
        
        // Clear cart
        cart = [];
        updateCartCount();
        
        // Clear form
        document.getElementById('postContent').value = '';
        document.getElementById('postImage').value = '';
        document.getElementById('newPostForm').classList.add('hidden');
        
        // Refresh forum posts
        renderMyPosts();
        
        // Update inbox badge for owner
        updateInboxBadge();
        
        showToast('Order placed! Auto +REP post created on home page!');
    }
    
    window.addReply = async function(postId) {
        const text = document.getElementById(`reply-${postId}`)?.value.trim();
        if (!text) return;
        const post = posts.find(p => p.id === postId);
        if (post) {
            post.replies = post.replies || [];
            post.replies.push({ username: currentUser.username, content: text, timestamp: new Date().toLocaleString() });
            await db.collection('posts').doc(postId).update({ replies: post.replies });
            renderMyPosts();
        }
    };
    
    window.deletePost = async function(postId) {
        const post = posts.find(p => p.id === postId);
        if (!post) return;
        if (currentUser?.isOwner || currentUser?.username === post.username) {
            await deletePostById(postId);
            posts = posts.filter(p => p.id !== postId);
            showToast('Post deleted');
            if (document.getElementById('forumPosts')) renderMyPosts();
        } else {
            showToast('You can only delete your own posts', true);
        }
    };
    
    window.markDelivered = async function(postId) {
        const post = posts.find(p => p.id === postId);
        if (post) {
            const key = `CFG-${Math.random().toString(36).substring(2,10).toUpperCase()}`;
            post.status = 'completed';
            post.replies = post.replies || [];
            post.replies.push({ username: 'OWNER', content: `✅ Payment verified! CFG Key: ${key}\nContact Discord: sufyancounter for file.`, timestamp: new Date().toLocaleString() });
            await db.collection('posts').doc(postId).update({ status: 'completed', replies: post.replies });
            
            const user = users.find(u => u.username === post.username);
            if (user && user.email) {
                await sendOrderConfirmationEmail(user.email, user.username, post.orderDetails || 'CFG Package', post.totalPrice || '10', key);
            }
            
            const newMsg = { from: 'sufyan', to: post.username, content: `🎮 Order Delivered!\nProduct: ${post.orderDetails || 'CFG'}\nTotal: $${post.totalPrice || '10'}\nKey: ${key}`, timestamp: new Date().toLocaleString(), read: false };
            const savedMsg = await saveMessage(newMsg);
            messages.push(savedMsg);
            updateInboxBadge();
            renderMyPosts();
            showToast(`Key sent to ${post.username} and email confirmation sent!`);
        }
    };
    
    window.viewOrderPost = function(postId) {
        const post = posts.find(p => p.id === postId);
        if (post) showModal('Order Details', `<div class="post"><strong>Product:</strong> ${post.orderDetails || 'N/A'}<br><strong>Total:</strong> $${post.totalPrice || '10'}<br><br>${post.content.replace(/\n/g,'<br>')}${post.image ? `<br><img src="${post.image}" style="max-width:100%; border-radius:12px; margin-top:10px;">` : ''}<br><br><small>${post.timestamp} | ${post.status}</small></div>`);
    };

    // Inbox
    function renderInbox(container) {
        if (!checkAuthAndRedirect('inbox')) { container.innerHTML = `<div class="card"><div class="card-title">Inbox</div><p>Please login to view messages.</p></div>`; return; }
        const userMsgs = messages.filter(m => m.to === currentUser.username || m.from === currentUser.username).sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp));
        if (userMsgs.length === 0) {
            container.innerHTML = `<div class="card"><div class="card-title">📬 Inbox</div><p style="text-align:center; padding:2rem;">No messages yet. Start a conversation with other members!</p><button onclick="composeMessage()">+ Send New Message</button></div>`;
            return;
        }
        container.innerHTML = `<div class="card"><div class="card-title">📬 Inbox</div><button onclick="composeMessage()">+ New Message</button><div id="inboxList">${userMsgs.map(m => `<div class="message-item ${!m.read && m.to===currentUser.username?'message-unread':''}" onclick="viewMessage(${m.id})"><strong>${m.from===currentUser.username?'To: '+m.to:'From: '+m.from}</strong><br>${m.content.substring(0,80)}${m.orderDetails ? `<br><small style="color:#f97316;">📦 Order: ${m.orderDetails}</small>` : ''}<br><small>${m.timestamp}</small>${currentUser?.isOwner ? `<button class="delete-btn" onclick="event.stopPropagation();deleteMessage(${m.id})">Delete</button>` : ''}</div>`).join('')}</div></div>`;
    }
    
    window.deleteMessage = async function(msgId) {
        if (!currentUser?.isOwner) return;
        showConfirm('Are you sure you want to delete this message?', async (confirmed) => {
            if (confirmed) {
                await deleteMessageById(msgId);
                messages = messages.filter(m => m.id !== msgId);
                updateInboxBadge();
                showToast('Message deleted');
                if (document.getElementById('inboxList')) showPage('inbox');
            }
        });
    };
    
    window.composeMessage = function() {
        const others = users.filter(u => u.username !== currentUser.username && !u.isBanned).map(u => u.username);
        if (others.length === 0) { showToast('No other users to message', true); return; }
        showModal('New Message', `<select id="msgTo">${others.map(o=>`<option value="${o}">${o}</option>`).join('')}</select><textarea id="msgContent" rows="4" placeholder="Type your message..." onkeypress="handleComposeEnter(event)"></textarea><button onclick="sendComposed()">Send</button>`);
    };
    
    window.handleComposeEnter = function(e) {
        if (e.key === 'Enter') { e.preventDefault(); sendComposed(); }
    };
    
    window.sendComposed = async function() {
        const to = document.getElementById('msgTo')?.value;
        const content = document.getElementById('msgContent')?.value.trim();
        if (!content) return;
        const newMsg = { from: currentUser.username, to: to, content: content, timestamp: new Date().toLocaleString(), read: false };
        const saved = await saveMessage(newMsg);
        messages.push(saved);
        updateInboxBadge();
        showToast('Sent');
        closeModal();
        showPage('inbox');
    };
    
    window.viewMessage = async function(id) {
        const msg = messages.find(m => m.id === id);
        if (msg && !msg.read && msg.to === currentUser.username) {
            msg.read = true;
            await db.collection('messages').doc(id).update({ read: true });
            updateInboxBadge();
        }
        let imageHtml = '';
        if (msg.hasImage && msg.imageData) {
            imageHtml = `<br><br><strong>📸 Screenshot:</strong><br><img src="${msg.imageData}" style="max-width:100%; border-radius:12px; margin-top:10px;">`;
        } else if (msg.hasImage) {
            imageHtml = `<br><br><strong>📸 Screenshot attached in order post (check Forum)</strong>`;
        }
        showModal('Message', `<strong>From: ${msg.from}</strong><br><strong>To: ${msg.to}</strong><br><strong>Time: ${msg.timestamp}</strong><br><br>${msg.content.replace(/\n/g,'<br>')}${msg.orderDetails ? `<br><br><strong>📦 Order Details:</strong> ${msg.orderDetails}<br><strong>💰 Total: $${msg.totalPrice || '10'}</strong>` : ''}${imageHtml}<br><br><button onclick="closeModal();startChatWith('${msg.from}')">Reply</button>`);
        if (currentUser.isOwner) showPage('inbox');
    };

    // Members
    function renderMembers(container) {
        if (!checkAuthAndRedirect('members')) { container.innerHTML = `<div class="card"><div class="card-title">Members</div><p>Please login to view members.</p></div>`; return; }
        container.innerHTML = `<div class="card"><div class="card-title">👥 Members Directory</div>
            <input type="text" id="memberSearch" placeholder="Search members..." onkeyup="filterMembers()">
            <div id="membersList" class="grid-3"></div></div>`;
        renderMembersList();
    }
    
    function renderMembersList() {
        const search = document.getElementById('memberSearch')?.value.toLowerCase() || '';
        const filtered = users.filter(u => u.username.toLowerCase().includes(search));
        document.getElementById('membersList').innerHTML = filtered.map(u => `
            <div class="member-card" onclick="showProfile('${u.username}')">
                <img class="avatar-small" style="width:50px;height:50px;border-radius:50%;" src="${u.avatar || `https://ui-avatars.com/api/?background=f97316&color=fff&name=${encodeURIComponent(u.username)}`}">
                <div class="${getUserGlowClass(u)}">${u.username}</div>
                ${getUserTagDisplay(u)}
                <div><span class="online-dot ${isOnline(u.username) ? 'online' : 'offline'}"></span> ${isOnline(u.username) ? 'Online' : 'Offline'}</div>
            </div>
        `).join('');
    }
    window.filterMembers = renderMembersList;

    // Chat
    function renderChat(container) {
        if (!checkAuthAndRedirect('chat')) { container.innerHTML = `<div class="card"><div class="card-title">Live Chat</div><p>Please login to join chat.</p></div>`; return; }
        container.innerHTML = `<div class="card"><div class="card-title">💬 Public Live Chat</div>
            <div id="chatMessages" class="chat-container"></div>
            <div style="display:flex; gap:0.5rem;"><input type="text" id="chatInput" placeholder="Type message... (emojis allowed)" onkeypress="handleChatEnter(event)" style="flex:1;"><button onclick="sendChatMessage()">Send</button></div>
            ${currentUser?.isOwner ? '<button onclick="clearAllChatWithConfirm()" style="margin-top:0.5rem; background:#6b7280;">🗑️ Clear All Chat</button>' : ''}
            </div>`;
        renderChatMessages();
        setInterval(renderChatMessages, 3000);
    }
    
    window.handleChatEnter = function(e) {
        if (e.key === 'Enter') { e.preventDefault(); sendChatMessage(); }
    };
    
    function renderChatMessages() {
        const container = document.getElementById('chatMessages');
        if (!container) return;
        container.innerHTML = chatMessages.slice(-50).map(m => {
            const user = users.find(u => u.username === m.username);
            return `<div class="chat-message"><span class="username ${getUserGlowClass(user || {})}" onclick="showProfile('${m.username}')">${m.username}</span> ${getUserTagDisplay(user || {})}<span class="time">${m.time}</span><br><div class="message-text">${m.message}</div>${currentUser?.isOwner ? `<button class="delete-btn" onclick="deleteChatMessage('${m.id}')">Delete</button>` : ''}</div>`;
        }).join('');
        container.scrollTop = container.scrollHeight;
    }
    
    window.sendChatMessage = async function() {
        const msg = document.getElementById('chatInput')?.value.trim();
        if (!msg) return;
        if (!canSendMessage(currentUser.username)) return;
        const newMsg = { username: currentUser.username, message: msg, time: new Date().toLocaleTimeString(), timestampMs: Date.now() };
        const saved = await saveChatMessage(newMsg);
        chatMessages.push(saved);
        document.getElementById('chatInput').value = '';
        renderChatMessages();
        const container = document.getElementById('chatMessages');
        if (container) container.scrollTop = container.scrollHeight;
    };
    
    window.deleteChatMessage = async function(id) {
        if (!currentUser?.isOwner) return;
        showConfirm('Delete this message?', async (confirmed) => {
            if (confirmed) {
                await deleteChatMessageById(id);
                chatMessages = chatMessages.filter(m => m.id != id);
                renderChatMessages();
                showToast('Message deleted');
            }
        });
    };

    // Store, Cart, Checkout
    function renderStore(container) {
        if (!checkAuthAndRedirect('store')) { container.innerHTML = `<div class="card"><div class="card-title">Store</div><p>Please login to purchase.</p></div>`; return; }
        container.innerHTML = `<div class="card"><div class="card-title">🛒 Available Configs</div><div class="grid-3" id="productsGrid"></div></div>`;
        document.getElementById('productsGrid').innerHTML = products.map(p => `<div class="product-card"><h3>${p.name}</h3><div class="product-price">$${p.price}</div><p>${p.description}</p><button onclick="addToCart(${p.id})">Add to Cart</button></div>`).join('');
    }
    
    window.addToCart = function(id) {
        const p = products.find(p=>p.id===id);
        const existing = cart.find(i=>i.id===id);
        if (existing) existing.quantity++;
        else cart.push({...p, quantity:1});
        updateCartCount();
        showToast(`${p.name} added`);
    };
    
    function renderCart(container) {
        if (!checkAuthAndRedirect('cart')) { container.innerHTML = `<div class="card"><div class="card-title">Cart</div><p>Please login to view cart.</p></div>`; return; }
        if (!cart.length) { container.innerHTML = `<div class="card"><div class="card-title">Cart Empty</div><button onclick="showPage('store')">Browse Store</button></div>`; return; }
        let total = 0;
        const items = cart.map(i => { total += i.price * i.quantity; return `<div class="cart-item"><span>${i.name} x${i.quantity}</span><span>$${i.price*i.quantity}</span><button onclick="removeFromCart(${i.id})" style="background:#3a2a2a;">Remove</button></div>`; }).join('');
        container.innerHTML = `<div class="card"><div class="card-title">🛒 Your Cart</div>${items}<div class="cart-item" style="border-top:2px solid #f97316;"><span>Total</span><span>$${total}</span></div><button onclick="showPage('checkout')">Checkout</button></div>`;
    }
    
    window.removeFromCart = function(id) { cart = cart.filter(i=>i.id!==id); updateCartCount(); showPage('cart'); };
    
    function renderCheckout(container) {
        if (!checkAuthAndRedirect('checkout')) { container.innerHTML = `<div class="card"><div class="card-title">Checkout</div><p>Please login to checkout.</p></div>`; return; }
        const total = cart.reduce((s,i)=>s+(i.price*i.quantity),0);
        const remitlyAmount = total;
        const ltcAmount = total === 10 ? 12 : total === 18 ? 20 : 12;
        const steamAmount = total === 10 ? 15 : total === 18 ? 25 : 15;
        container.innerHTML = `<div class="card"><div class="card-title">💳 Checkout</div>
            <p><strong>Total: <span style="color:#f97316;">$${total}</span></strong></p>
            <div style="background:#0a0e16;padding:1.5rem;border-radius:16px;margin:1rem 0;">
                <h3 style="color:#f97316;">📱 Option 1: EasyPaisa (via Remitly)</h3>
                <p>Send payment through Remitly — fast and simple.<br>Select <strong>Pakistan</strong> → <strong>EasyPaisa Mobile Wallet</strong></p>
                <p><strong>Details:</strong><br>Name: Muhammad Arshad<br>Mobile: +92 348 8308531<br>Country: Pakistan<br>Bank: EasyPaisa</p>
                <p><strong style="color:#f97316;">⚠️ Send <span style="color:#f97316;">$${remitlyAmount} USD</span></strong></p>
                <hr style="margin:1rem 0; border-color:#2a2f42;">
                <h3 style="color:#f97316;">₿ Option 2: Litecoin (LTC)</h3>
                <p>Send exactly <strong style="color:#f97316;">$${ltcAmount} USD</strong> worth of LTC to:</p>
                <code style="background:#000;padding:10px;display:block;word-break:break-all;border-radius:8px;">ltc1qplpy27p9q3rlrmv2t5srmw8hkytm6xhp663we3</code>
                <hr style="margin:1rem 0; border-color:#2a2f42;">
                <h3 style="color:#f97316;">🎮 Option 3: Steam Wallet Code (US Region)</h3>
                <p>Send <strong style="color:#f97316;">$${steamAmount} USD</strong> Steam Wallet Gift Card (US Region)<br>Buy from <strong>G2A.com</strong> or <strong>G2G.com</strong><br>Search: "Steam Wallet Code US $${steamAmount}"</p>
                <p><strong>Instructions:</strong><br>1. Buy Steam Wallet Code from G2A/G2G<br>2. Send code to owner on Discord: <strong>sufyancounter</strong><br>3. After verification, your CFG will be delivered</p>
                <p><strong style="color:#f97316;">⚠️ Send <span style="color:#f97316;">$${steamAmount} USD</span> Steam Wallet Code (US Region)</strong></p>
            </div>
            <button onclick="showPage('forum')">📝 Submit Payment Proof</button>
        </div>`;
    }

    // Home
    function renderHome(container) {
        const repPosts = posts.filter(p => p.isAutoRep === true);
        container.innerHTML = `<div class="card"><div class="card-title">⚡ Welcome to Counter Prime</div>
            <p>Professional CFG Store & Community Forum | Lifetime Updates | Undetected</p>
            <button onclick="showPage('store')">Browse Store</button>
            <button class="btn-secondary" onclick="showPage('forum')">My Orders</button>
        </div>
        <div class="grid-2">
            <div class="card"><div class="card-title">📋 Latest Reputation</div>
                <div id="latestPosts">${repPosts.slice(0,10).map(p=>`<div style="padding:8px 0; border-bottom:1px solid #1f2538; display:flex; justify-content:space-between; align-items:center;"><div><strong class="${getUserGlowClass(users.find(u=>u.username===p.username)||{})}" onclick="showProfile('${p.username}')">${p.username}</strong>: ${p.content}<br><small style="color:#7e849b;">${p.timestamp}</small></div>${currentUser?.isOwner ? `<button class="rep-delete-btn" onclick="deleteRepPost(${p.id})">Delete</button>` : ''}</div>`).join('') || 'No reputation posts yet'}</div>
            </div>
            <div class="card"><div class="card-title">💬 Live Chat</div>
                <div id="homeChat" class="chat-container" style="height:350px;"></div>
                <div style="display:flex; gap:0.5rem;"><input type="text" id="homeChatInput" placeholder="Type message..." onkeypress="handleHomeChatEnter(event)" style="flex:1;"><button onclick="sendHomeChatMessage()">Send</button></div>
                ${currentUser?.isOwner ? '<button onclick="clearHomeChat()" style="margin-top:0.5rem; background:#6b7280;">🗑️ Clear All Chat</button>' : ''}
            </div>
        </div>`;
        renderHomeChat();
        setInterval(renderHomeChat, 3000);
    }
    
    function renderHomeChat() {
        const container = document.getElementById('homeChat');
        if (!container) return;
        container.innerHTML = chatMessages.slice(-20).map(m => {
            const user = users.find(u => u.username === m.username);
            return `<div class="chat-message" style="padding:0.5rem;"><strong class="${getUserGlowClass(user || {})}" onclick="showProfile('${m.username}')">${m.username}</strong> <span style="font-size:0.65rem; color:#6b7280;">${m.time}</span><br>${m.message}</div>`;
        }).join('');
        container.scrollTop = container.scrollHeight;
    }
    
    window.sendHomeChatMessage = async function() {
        const msg = document.getElementById('homeChatInput')?.value.trim();
        if (!msg) return;
        if (!canSendMessage(currentUser.username)) return;
        const newMsg = { username: currentUser.username, message: msg, time: new Date().toLocaleTimeString(), timestampMs: Date.now() };
        const saved = await saveChatMessage(newMsg);
        chatMessages.push(saved);
        document.getElementById('homeChatInput').value = '';
        renderHomeChat();
        const container = document.getElementById('homeChat');
        if (container) container.scrollTop = container.scrollHeight;
    };
    
    window.handleHomeChatEnter = function(e) {
        if (e.key === 'Enter') sendHomeChatMessage();
    };
    
    function showPage(page) {
        const content = document.getElementById('pageContent');
        if (page === 'home') renderHome(content);
        else if (page === 'store') renderStore(content);
        else if (page === 'forum') renderForum(content);
        else if (page === 'cart') renderCart(content);
        else if (page === 'inbox') renderInbox(content);
        else if (page === 'members') renderMembers(content);
        else if (page === 'chat') renderChat(content);
        else if (page === 'checkout') renderCheckout(content);
    }
    
    function logout() { 
        currentUser = null; 
        localStorage.removeItem('currentUser');
        updateNav(); 
        updateInboxBadge();
        showToast('Logged out'); 
        showPage('home'); 
    }
    
    async function init() {
        await loadAllData();
        await loadCurrentUser();
        updateNav();
        updateInboxBadge();
        showPage('home');
        setInterval(async () => { 
            await loadAllData();
            updateInboxBadge();
            if (document.getElementById('membersList')) renderMembersList(); 
            if (document.getElementById('chatMessages')) renderChatMessages(); 
            if (document.getElementById('homeChat')) renderHomeChat(); 
        }, 10000);
    }
    init();
</script>
</body>
