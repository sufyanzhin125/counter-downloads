<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Counter Download | YouTube Downloader</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Courier New', monospace;
        }

        body {
            background: radial-gradient(circle at 20% 30%, #0a0f1e, #010101);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .header {
            background: rgba(5, 10, 25, 0.9);
            backdrop-filter: blur(12px);
            border-radius: 40px;
            border: 1px solid #00ffcc;
            padding: 25px;
            margin-bottom: 25px;
            text-align: center;
        }

        h1 {
            font-size: 32px;
            background: linear-gradient(135deg, #0ff, #f0f);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .counter {
            background: #000000aa;
            display: inline-block;
            padding: 10px 25px;
            border-radius: 50px;
            margin-top: 15px;
            border: 1px solid #ffaa33;
            color: #ffaa33;
            font-weight: bold;
        }

        .ad-area {
            background: linear-gradient(145deg, #2a0f2a, #1a0522);
            border: 2px solid #ff44aa;
            padding: 18px;
            border-radius: 60px;
            text-align: center;
            margin-bottom: 25px;
            cursor: pointer;
            font-weight: bold;
            color: #ffccff;
            font-size: 18px;
            transition: 0.2s;
        }

        .ad-area:hover {
            background: #ff44aa55;
            transform: scale(1.01);
        }

        .iframe-container {
            background: rgba(0,0,0,0.6);
            border-radius: 30px;
            padding: 10px;
            border: 1px solid #0ff;
        }

        iframe {
            width: 100%;
            height: 550px;
            border: none;
            border-radius: 25px;
            background: #fff;
        }

        footer {
            text-align: center;
            margin-top: 25px;
            color: #6c8baa;
            font-size: 12px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>⚡ COUNTER DOWNLOAD ⚡</h1>
        <div class="counter" id="totalDownloads">📥 TOTAL DOWNLOADS: 0</div>
    </div>

    <div class="ad-area" id="adTrigger">
        💰 CLICK HERE FIRST — SUPPORT THE SITE 💰<br>
        (One click unlocks the downloader)
    </div>

    <div class="iframe-container" id="downloaderFrame" style="display: none;">
        <iframe src="https://en.savefrom.net/1-youtube-video-downloader-13sg/"></iframe>
    </div>

    <footer>🔒 First click opens link • Then use the YouTube downloader below</footer>
</div>

<script>
    const AD_LINK = "https://discord.gg/AVqw2YzGB";  // YOUR DISCORD LINK
    let adClicked = false;

    // Load counter
    let totalDownloads = localStorage.getItem('totalDownloads') ? parseInt(localStorage.getItem('totalDownloads')) : 0;
    document.getElementById('totalDownloads').innerText = '📥 TOTAL DOWNLOADS: ' + totalDownloads;

    if(localStorage.getItem('adClicked') === 'true') {
        adClicked = true;
        document.getElementById('adTrigger').style.display = 'none';
        document.getElementById('downloaderFrame').style.display = 'block';
    }

    // Ad click
    document.getElementById('adTrigger').onclick = function() {
        if(!adClicked) {
            window.open(AD_LINK, '_blank');
            adClicked = true;
            localStorage.setItem('adClicked', 'true');
            this.style.display = 'none';
            document.getElementById('downloaderFrame').style.display = 'block';
            
            totalDownloads++;
            localStorage.setItem('totalDownloads', totalDownloads);
            document.getElementById('totalDownloads').innerText = '📥 TOTAL DOWNLOADS: ' + totalDownloads;
        }
    };
</script>
</body>
</html>
