    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: radial-gradient(circle at 10% 20%, #0a0c12 0%, #03060c 100%);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: #eef2ff;
            line-height: 1.5;
            min-height: 100vh;
        }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #11151f; }
        ::-webkit-scrollbar-thumb { background: linear-gradient(135deg, #dc2626, #f97316); border-radius: 4px; }

        .navbar {
            background: rgba(10, 12, 18, 0.9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(249, 115, 22, 0.2);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo {
            font-size: 1.6rem;
            font-weight: 700;
            cursor: pointer;
            background: linear-gradient(135deg, #fff, #dc2626, #f97316);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .nav-links { display: flex; gap: 1.5rem; align-items: center; flex-wrap: wrap; }
        .nav-links a { color: #b0b7d0; text-decoration: none; font-size: 0.9rem; cursor: pointer; transition: 0.3s; position: relative; }
        .nav-links a:hover { color: #f97316; }
        .inbox-badge { position: relative; }
        .badge-count {
            position: absolute;
            top: -8px;
            right: -12px;
            background: #dc2626;
            color: white;
            font-size: 0.65rem;
            font-weight: bold;
            padding: 2px 6px;
            border-radius: 20px;
            min-width: 18px;
            text-align: center;
        }
        .user-info { display: flex; align-items: center; gap: 1rem; }
        .tag {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
        }
        .tag-owner { background: #dc2626; color: white; box-shadow: 0 0 12px #dc2626; }
        .tag-prime { background: #f97316; color: white; box-shadow: 0 0 12px #f97316; }
        .tag-premium { background: #eab308; color: #1a1a2e; box-shadow: 0 0 12px #eab308; }
        .tag-vip { background: #a855f7; color: white; box-shadow: 0 0 12px #a855f7; }
        .tag-member { background: #2a2f42; color: #b0b7d0; }
        .tag-banned { background: #000; color: white; border: 1px solid #ff0000; }
        .glow-name { text-shadow: 0 0 8px currentColor; }
        .glow-prime { color: #fb923c; text-shadow: 0 0 12px #f97316; }

        .container { max-width: 1400px; margin: 0 auto; padding: 2rem; }
        .card {
            background: rgba(17, 21, 31, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 24px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(249, 115, 22, 0.15);
        }
        .card-title {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: #fff;
            border-left: 3px solid #f97316;
            padding-left: 1rem;
        }
        input, select, textarea {
            width: 100%;
            background: #0a0e16;
            border: 1px solid #252c3f;
            padding: 12px 16px;
            border-radius: 14px;
            color: white;
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #f97316;
            box-shadow: 0 0 0 3px rgba(249,115,22,0.2);
        }
        button {
            background: linear-gradient(135deg, #dc2626, #f97316);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        button:hover { transform: scale(0.98); opacity: 0.9; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
        .grid-3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1.5rem; }
        .product-card {
            background: #0a0e16;
            border-radius: 20px;
            padding: 1.2rem;
            text-align: center;
            border: 1px solid #1f2538;
            transition: all 0.3s;
        }
        .product-card:hover { border-color: #f97316; transform: translateY(-5px); }
        .product-price { color: #f97316; font-size: 1.5rem; font-weight: 700; margin: 0.5rem 0; }
        .cart-item { display: flex; justify-content: space-between; padding: 0.75rem 0; border-bottom: 1px solid #1f2538; }
        .post {
            background: #0a0e16;
            border-radius: 20px;
            padding: 1rem;
            margin-bottom: 1rem;
            border-left: 3px solid #f97316;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(12px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: linear-gradient(135deg, #11151f, #0f1119);
            padding: 2rem;
            border-radius: 28px;
            max-width: 500px;
            width: 90%;
            border: 1px solid rgba(249,115,22,0.5);
            max-height: 80vh;
            overflow-y: auto;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #11151f;
            border-left: 4px solid #f97316;
            padding: 1rem 1.5rem;
            border-radius: 14px;
            color: white;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .confirm-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        .confirm-box {
            background: #11151f;
            border-radius: 24px;
            padding: 1.5rem;
            max-width: 400px;
            width: 90%;
            border: 1px solid #f97316;
            text-align: center;
        }
        .confirm-box h3 { color: #f97316; margin-bottom: 1rem; }
        .confirm-buttons { display: flex; gap: 1rem; justify-content: center; }
        .confirm-yes { background: #dc2626; }
        .confirm-no { background: #2a2f42; }
        .hidden { display: none; }
        .avatar { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 2px solid #f97316; margin-bottom: 1rem; }
        .avatar-small { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; }
        .message-item {
            background: #0a0e16;
            padding: 0.75rem;
            border-radius: 14px;
            margin-bottom: 0.5rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .message-item:hover { background: #1a1e2a; transform: translateX(3px); }
        .message-unread { border-left: 3px solid #f97316; }
        .member-card {
            background: #0a0e16;
            border-radius: 20px;
            padding: 1rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .member-card:hover { border-color: #f97316; transform: translateY(-3px); }
        .online-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-left: 5px; }
        .online { background: #10b981; box-shadow: 0 0 5px #10b981; }
        .offline { background: #6b7280; }
        .chat-container {
            height: 450px;
            overflow-y: auto;
            background: #0a0e16;
            border-radius: 20px;
            padding: 1rem;
            margin-bottom: 1rem;
        }
        .chat-message { padding: 0.75rem; border-radius: 14px; margin-bottom: 0.75rem; }
        .delete-btn { background: #6b7280; padding: 2px 10px; font-size: 0.7rem; margin-left: 0.5rem; border-radius: 8px; cursor: pointer; }
        .rep-delete-btn { background: #dc2626; padding: 2px 8px; font-size: 0.65rem; margin-left: 8px; border-radius: 6px; cursor: pointer; display: inline-block; }
        footer { text-align: center; padding: 2rem; color: #5a637c; font-size: 0.75rem; border-top: 1px solid #1f2538; margin-top: 2rem; }
        @media (max-width: 768px) { .grid-2 { grid-template-columns: 1fr; } .navbar { flex-direction: column; text-align: center; } .chat-container { height: 350px; } }
    </style>
</head>
<body>
<div id="app">

</div>

<script>
    // Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyBiT6KqM3HRSDkRrWx5wOmQCgfD7TD_Jz8",
        authDomain: "counterprime-c1f95.firebaseapp.com",
        projectId: "counterprime-c1f95",
        storageBucket: "counterprime-c1f95.firebasestorage.app",
        messagingSenderId: "1012703022142",
        appId: "1:1012703022142:web:bbc9d4c71904e44b5c556f",
        measurementId: "G-B8XJKGCH25"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    
    // EmailJS
    (function() { emailjs.init("Csg4OWKUCevBX8W5A"); })();

    // Data
    let users = [], currentUser = null, cart = [], posts = [], messages = [], userTags = {}, chatMessages = [], lastActivity = {}, userTimeouts = {}, userMessageCount = {}, resetCodes = {};

    const autoRepMessages = ["+REP Trusted seller! 🔥","+VOUCH Legit config! 💯","+REP Fast delivery! ⚡","VOUCH +1 Great service! 🌟","+REP 100% legit! ✅","Trusted member! 🤝","+VOUCH Highly recommended! 🎯","REP++ Best config ever! 🚀","Legit seller! 🔥🔥","+REP Will buy again! 💪","VOUCH! Working perfectly! 🎮","Trusted! Fast response! ⏱️","+REP Professional! 👑","VOUCH +100! 🏆","Legit and safe! 🔒","+REP A+ Service! ⭐","Trusted config master! 🧙","VOUCH! No ban! 🔥","+REP Great support! 💬","100% working! 🎯"];
    const products = [{ id: 1, name: "Deadlock CFG", price: 10, description: "Full config" },{ id: 2, name: "Dota 2 CFG", price: 10, description: "Pro scripts" },{ id: 3, name: "Bundle", price: 18, description: "Both games" }];
    const availableTags = ['prime','premium','vip','elite','legend','god','hacker'];

    function isValidEmail(e) { return /^[^\s@]+@([^\s@]+\.)+[^\s@]+$/.test(e); }
    function showToast(msg, isErr = false) { let t = document.createElement('div'); t.className = 'toast'; t.style.borderLeftColor = isErr ? '#dc2626' : '#10b981'; t.innerHTML = msg; document.body.appendChild(t); setTimeout(() => t.remove(), 3000); }
    function showModal(title, html) { let m = document.getElementById('globalModal'); if(!m){ m=document.createElement('div'); m.id='globalModal'; m.className='modal'; m.innerHTML=`<div class="modal-content"><div id="modalTitle" style="font-size:1.3rem; font-weight:600; margin-bottom:1rem; color:#f97316;"></div><div id="modalBody"></div><button onclick="closeModal()" style="margin-top:1rem;">Close</button></div>`; document.body.appendChild(m); } document.getElementById('modalTitle').innerText=title; document.getElementById('modalBody').innerHTML=html; m.style.display='flex'; }
    window.closeModal = function() { let m = document.getElementById('globalModal'); if(m) m.style.display='none'; };
    document.addEventListener('keydown', (e) => { if(e.key==='Escape') closeModal(); });
    function showConfirm(msg, onConfirm) { let o = document.createElement('div'); o.className='confirm-overlay'; o.innerHTML=`<div class="confirm-box"><h3>⚠️ Confirm Action</h3><p>${msg}</p><div class="confirm-buttons"><button class="confirm-yes" id="confirmYes">Yes</button><button class="confirm-no" id="confirmNo">No</button></div></div>`; document.body.appendChild(o); let yes=o.querySelector('#confirmYes'), no=o.querySelector('#confirmNo'); let cleanup=()=>o.remove(); yes.onclick=()=>{cleanup(); onConfirm(true);}; no.onclick=()=>{cleanup(); onConfirm(false);}; }

    // Firebase functions
    async function loadAllData() {
        let u = await db.collection('users').get(); users=[]; u.forEach(d=>users.push({id:d.id,...d.data()}));
        let p = await db.collection('posts').orderBy('timestampMs','desc').get(); posts=[]; p.forEach(d=>posts.push({id:d.id,...d.data()}));
        let m = await db.collection('messages').get(); messages=[]; m.forEach(d=>messages.push({id:d.id,...d.data()}));
        let t = await db.collection('userTags').get(); userTags={}; t.forEach(d=>{userTags[d.id]=d.data();});
        let c = await db.collection('chatMessages').orderBy('timestampMs','asc').get(); chatMessages=[]; c.forEach(d=>chatMessages.push({id:d.id,...d.data()}));
        let a = await db.collection('lastActivity').get(); lastActivity={}; a.forEach(d=>{lastActivity[d.id]=d.data().timestamp;});
        updateCartCount(); updateInboxBadge();
    }
    async function saveUser(u){ await db.collection('users').doc(u.id).set(u); }
    async function savePost(p){ let r=await db.collection('posts').add(p); p.id=r.id; return p; }
    async function deletePostById(id){ await db.collection('posts').doc(id).delete(); }
    async function saveMessage(m){ let r=await db.collection('messages').add(m); m.id=r.id; return m; }
    async function deleteMessageById(id){ await db.collection('messages').doc(id).delete(); }
    async function saveUserTag(u,d){ await db.collection('userTags').doc(u).set(d); }
    async function deleteUserTag(u){ await db.collection('userTags').doc(u).delete(); }
    async function saveChatMessage(m){ let r=await db.collection('chatMessages').add(m); m.id=r.id; return m; }
    async function deleteChatMessageById(id){ await db.collection('chatMessages').doc(id).delete(); }
    async function clearAllChat(){ let s=await db.collection('chatMessages').get(); s.forEach(d=>d.ref.delete()); }
    async function saveLastActivity(u){ await db.collection('lastActivity').doc(u).set({timestamp:Date.now()}); }
    async function loadCurrentUser(){ let s=localStorage.getItem('currentUser'); if(s){ let d=JSON.parse(s); let u=await db.collection('users').doc(d.id).get(); if(u.exists){ currentUser={id:u.id,...u.data()}; updateInboxBadge(); return true; } } return false; }

    function updateCartCount(){ let e=document.getElementById('cartCount'); if(e) e.innerText=cart.reduce((s,i)=>s+i.quantity,0); }
    function updateInboxBadge(){ let b=document.getElementById('inboxBadge'); if(!b) return; if(currentUser){ let c=messages.filter(m=>m.to===currentUser.username && !m.read).length; if(c>0){ b.innerText=c; b.classList.remove('hidden'); } else b.classList.add('hidden'); } else b.classList.add('hidden'); }
    function updateLastActivity(){ if(currentUser){ lastActivity[currentUser.username]=Date.now(); saveLastActivity(currentUser.username); } }
    setInterval(updateLastActivity,30000);
    function isOnline(u){ return lastActivity[u] && (Date.now()-lastActivity[u])<300000; }
    function getUserTagDisplay(u){ if(!u) return '<span class="tag tag-member">MEMBER</span>'; if(u.isBanned) return '<span class="tag tag-banned">BANNED</span>'; if(u.isOwner) return '<span class="tag tag-owner">OWNER</span>'; let d=userTags[u.username]; if(d){ let m={prime:'tag-prime',premium:'tag-premium',vip:'tag-vip'}; return `<span class="tag ${m[d.tag]||'tag-member'}">${d.tag.toUpperCase()}</span>`; } return '<span class="tag tag-member">MEMBER</span>'; }
    function getUserGlowClass(u){ if(!u) return ''; if(u.isBanned) return ''; if(u.isOwner) return 'glow-name glow-prime'; let d=userTags[u.username]; if(d?.glow){ let m={prime:'glow-prime',premium:'glow-premium',vip:'glow-vip'}; return `glow-name ${m[d.tag]||''}`; } return ''; }
    function checkAuth(){ if(!currentUser || currentUser.isBanned){ showLoginModal(); return false; } return true; }

    async function createAutoOrderPost(username){ let msg=autoRepMessages[Math.floor(Math.random()*autoRepMessages.length)]; let u=users.find(u=>u.username===username); let p={username,userId:u?.id,content:msg,image:null,timestamp:new Date().toLocaleString(),timestampMs:Date.now(),replies:[],status:'completed',isAutoRep:true,isOrderRep:true}; let s=await savePost(p); posts.unshift(s); return s.id; }
    async function sendOrderEmail(email,username,details,price,key){ try{ await emailjs.send('service_gc26579','template_1didmn9',{to_email:email,username,order_details:details,total_price:price,cfg_key:key,discord:"sufyancounter"}); showToast(`Email sent to ${username}!`); }catch(e){ console.log(e); } }

    // Register/Login
    window.showRegisterModal=function(){ showModal('📝 Create Account',`<input id="regU" placeholder="Username"><input id="regE" placeholder="Email"><input id="regP" type="password" placeholder="Password (min 4)"><button onclick="register()">Create Account</button><p><a onclick="closeModal();showLoginModal();">Login</a></p>`); };
    window.register=async function(){ let u=document.getElementById('regU').value.trim(), e=document.getElementById('regE').value.trim(), p=document.getElementById('regP').value; if(!u||!e||!p){ showToast('All fields required',true); return; } if(!isValidEmail(e)){ showToast('Valid email required',true); return; } if(users.find(x=>x.username===u)){ showToast('Username taken',true); return; } if(users.find(x=>x.email===e)){ showToast('Email registered',true); return; } if(p.length<4){ showToast('Min 4 chars',true); return; } let isOwner=(u==='sufyan'); let nu={id:Date.now().toString(),username:u,email:e,country:'Not specified',password:p,isOwner,isBanned:false,registeredAt:new Date().toISOString(),avatar:null}; users.push(nu); await saveUser(nu); currentUser=nu; localStorage.setItem('currentUser',JSON.stringify({id:nu.id,username:nu.username})); updateNav(); closeModal(); updateInboxBadge(); showToast(`Welcome ${u}!`); showPage('home'); };
    function showLoginModal(){ showModal('🔐 Login',`<input id="loginU" placeholder="Username"><input id="loginP" type="password" placeholder="Password"><button onclick="login()">Login</button><p><a onclick="closeModal();showForgotPasswordModal();">Forgot Password?</a> | <a onclick="closeModal();showRegisterModal();">Register</a></p>`); }
    window.login=async function(){ let u=document.getElementById('loginU').value, p=document.getElementById('loginP').value; let user=users.find(x=>x.username===u); if(!user){ showToast('Username not found',true); return; } if(user.password!==p){ showToast('Incorrect password',true); return; } if(user.isBanned){ showToast('Account banned',true); return; } currentUser=user; localStorage.setItem('currentUser',JSON.stringify({id:user.id,username:user.username})); updateNav(); closeModal(); updateInboxBadge(); showToast(`Welcome ${u}!`); showPage('home'); };
    function showForgotPasswordModal(){ showModal('Reset Password',`<input id="resetEmail" placeholder="Email"><button onclick="sendResetCode()">Send Code</button><p><a onclick="closeModal();showLoginModal();">Back</a></p>`); }
    window.sendResetCode=async function(){ let e=document.getElementById('resetEmail').value.trim(); if(!e){ showToast('Enter email',true); return; } let u=users.find(x=>x.email===e); if(!u){ showToast('Email not found',true); return; } let code=Math.floor(100000+Math.random()*900000).toString(); resetCodes[e]={code,expires:Date.now()+3600000,username:u.username}; try{ await emailjs.send('service_gc26579','template_19b3qtx',{to_email:e,username:u.username,code}); showToast(`Code sent to ${e}`); closeModal(); showResetModal(e); }catch(err){ showModal('Reset Code',`<h3>Your Code: ${code}</h3><button onclick="closeModal();showResetModal('${e}')">Continue</button>`); } };
    function showResetModal(e){ showModal('Reset Password',`<input id="rcode" placeholder="6-digit code"><input id="rnew" type="password" placeholder="New Password"><input id="rconf" type="password" placeholder="Confirm"><button onclick="completeReset('${e}')">Reset</button>`); }
    window.completeReset=async function(e){ let code=document.getElementById('rcode').value.trim(), newp=document.getElementById('rnew').value, conf=document.getElementById('rconf').value; let rd=resetCodes[e]; if(!rd){ showToast('No request',true); return; } if(Date.now()>rd.expires){ showToast('Code expired',true); delete resetCodes[e]; return; } if(code!==rd.code){ showToast('Invalid code',true); return; } if(!newp||newp.length<4){ showToast('Min 4 chars',true); return; } if(newp!==conf){ showToast('Passwords do not match',true); return; } let u=users.find(x=>x.email===e); if(u){ u.password=newp; await saveUser(u); delete resetCodes[e]; showToast('Password reset!'); closeModal(); showLoginModal(); } };
    function updateNav(){ if(currentUser && !currentUser.isBanned){ document.getElementById('authNav').classList.add('hidden'); document.getElementById('userNav').classList.remove('hidden'); let a=currentUser.avatar||`https://ui-avatars.com/api/?background=f97316&color=fff&name=${encodeURIComponent(currentUser.username)}`; document.getElementById('navAvatar').src=a; document.getElementById('userTag').innerHTML=`${currentUser.username} ${getUserTagDisplay(currentUser)}`; }else if(currentUser && currentUser.isBanned){ logout(); showToast('Account banned',true); }else{ document.getElementById('authNav').classList.remove('hidden'); document.getElementById('userNav').classList.add('hidden'); } updateInboxBadge(); }
    function canSendMessage(u){ let user=users.find(x=>x.username===u); let tag=userTags[u]?.tag||(user?.isOwner?'owner':'member'); let now=Date.now(); if(userTimeouts[u] && userTimeouts[u]>now){ let r=Math.ceil((userTimeouts[u]-now)/1000); showToast(`Wait ${r}s`,true); return false; } if(!userMessageCount[u]) userMessageCount[u]=[]; userMessageCount[u]=userMessageCount[u].filter(t=>now-t<5000); if(tag==='member'){ if(userMessageCount[u].length>=1){ showToast('Wait 5s',true); return false; } }else{ if(userMessageCount[u].length>=5){ userTimeouts[u]=now+120000; userMessageCount[u]=[]; showToast('Spam! 2min timeout',true); return false; } } userMessageCount[u].push(now); return true; }

    function renderHome(container){ let rep=posts.filter(p=>p.isAutoRep===true); container.innerHTML=`<div class="card"><div class="card-title">⚡ Welcome to Counter Prime</div><p>Professional CFG Store</p><button onclick="showPage('store')">Store</button><button onclick="showPage('forum')">My Orders</button></div><div class="grid-2"><div class="card"><div class="card-title">📋 Latest Reputation</div><div id="latestRep">${rep.slice(0,10).map(p=>`<div style="padding:8px 0; border-bottom:1px solid #1f2538; display:flex; justify-content:space-between;"><div><strong class="${getUserGlowClass(users.find(u=>u.username===p.username)||{})}" onclick="showProfile('${p.username}')">${p.username}</strong>: ${p.content}<br><small>${p.timestamp}</small></div>${currentUser?.isOwner?`<button class="rep-delete-btn" onclick="deleteRepPost('${p.id}')">Delete</button>`:''}</div>`).join('')||'No posts'}</div></div><div class="card"><div class="card-title">💬 Live Chat</div><div id="homeChat" class="chat-container" style="height:300px;"></div><div style="display:flex;"><input type="text" id="homeChatInput" placeholder="Message..." onkeypress="handleHomeChatEnter(event)" style="flex:1;"><button onclick="sendHomeChat()">Send</button></div>${currentUser?.isOwner?'<button onclick="clearHomeChat()" style="margin-top:0.5rem;">Clear All Chat</button>':''}</div></div>`; renderHomeChat(); setInterval(renderHomeChat,3000); }
    function renderHomeChat(){ let c=document.getElementById('homeChat'); if(!c) return; c.innerHTML=chatMessages.slice(-20).map(m=>{ let u=users.find(x=>x.username===m.username); return `<div><strong class="${getUserGlowClass(u||{})}" onclick="showProfile('${m.username}')">${m.username}</strong> <span style="font-size:0.65rem;">${m.time}</span><br>${m.message}</div>`; }).join(''); c.scrollTop=c.scrollHeight; }
    window.sendHomeChat=async function(){ let msg=document.getElementById('homeChatInput').value.trim(); if(!msg) return; if(!canSendMessage(currentUser.username)) return; let m={username:currentUser.username,message:msg,time:new Date().toLocaleTimeString(),timestampMs:Date.now()}; let s=await saveChatMessage(m); chatMessages.push(s); document.getElementById('homeChatInput').value=''; renderHomeChat(); };
    window.handleHomeChatEnter=function(e){ if(e.key==='Enter') sendHomeChat(); };
    window.deleteRepPost=async function(id){ if(!currentUser?.isOwner) return; showConfirm('Delete this reputation post?',async(c)=>{ if(c){ await deletePostById(id); posts=posts.filter(p=>p.id!==id); showToast('Deleted'); renderHome(document.getElementById('pageContent')); } }); };

    function showPage(p){ let c=document.getElementById('pageContent'); if(p==='home') renderHome(c); else if(p==='store') renderStore(c); else if(p==='forum') renderForum(c); else if(p==='cart') renderCart(c); else if(p==='inbox') renderInbox(c); else if(p==='members') renderMembers(c); else if(p==='chat') renderChat(c); else if(p==='checkout') renderCheckout(c); }
    function logout(){ currentUser=null; localStorage.removeItem('currentUser'); updateNav(); updateInboxBadge(); showToast('Logged out'); showPage('home'); }
    async function init(){ await loadAllData(); await loadCurrentUser(); updateNav(); showPage('home'); setInterval(async()=>{ await loadAllData(); updateInboxBadge(); if(document.getElementById('membersList')) renderMembersList(); if(document.getElementById('chatMessages')) renderChatMessages(); if(document.getElementById('homeChat')) renderHomeChat(); },10000); }
    init();
</script>
</body>
</html>
