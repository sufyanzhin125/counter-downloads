<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Counter Download | YouTube Video Downloader</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Courier New', monospace;
        }

        body {
            background: radial-gradient(circle at 20% 30%, #0a0f1e, #010101);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(5, 10, 25, 0.9);
            backdrop-filter: blur(12px);
            border-radius: 40px;
            border: 1px solid #00ffcc;
            box-shadow: 0 0 40px rgba(0, 255, 200, 0.3);
            padding: 30px 25px;
            width: 100%;
            max-width: 600px;
        }

        h1 {
            font-size: 32px;
            text-align: center;
            background: linear-gradient(135deg, #0ff, #f0f);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .counter {
            background: #000000aa;
            text-align: center;
            padding: 12px;
            border-radius: 50px;
            margin: 20px 0;
            border: 1px solid #ffaa33;
            color: #ffaa33;
            font-weight: bold;
            font-size: 18px;
        }

        .ad-area {
            background: linear-gradient(145deg, #2a0f2a, #1a0522);
            border: 2px solid #ff44aa;
            padding: 15px;
            border-radius: 50px;
            text-align: center;
            margin: 20px 0;
            cursor: pointer;
            transition: 0.2s;
            font-weight: bold;
            color: #ffccff;
        }

        .ad-area:hover {
            background: #ff44aa55;
            transform: scale(1.01);
        }

        input {
            width: 100%;
            padding: 14px 18px;
            background: #0a0f1a;
            border: 1px solid #0ff;
            border-radius: 50px;
            color: #0ff;
            font-size: 16px;
            outline: none;
            margin-bottom: 18px;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(95deg, #0ff, #f0f);
            border: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
        }

        button:active {
            transform: scale(0.98);
        }

        .result {
            margin-top: 25px;
            background: #000000aa;
            border-radius: 30px;
            padding: 18px;
            display: none;
            border-left: 4px solid #0ff;
        }

        .video-title {
            color: #0ff;
            font-weight: bold;
            word-break: break-word;
            margin-bottom: 15px;
        }

        .download-link {
            display: inline-block;
            background: #0ff;
            color: black;
            padding: 12px 20px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            margin-top: 10px;
            width: 100%;
            text-align: center;
        }

        footer {
            text-align: center;
            font-size: 11px;
            margin-top: 25px;
            color: #6c8baa;
        }
        
        .quality-select {
            width: 100%;
            padding: 12px;
            background: #0a0f1a;
            border: 1px solid #0ff;
            border-radius: 50px;
            color: #0ff;
            margin-bottom: 15px;
            font-size: 14px;
        }
        
        .loading {
            color: #ffaa33;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>⚡ COUNTER DOWNLOAD ⚡</h1>
    
    <div class="counter" id="totalDownloads">📥 TOTAL DOWNLOADS: 0</div>

    <div class="ad-area" id="adTrigger">
        💰 CLICK HERE FIRST — SUPPORT THE SITE 💰<br>
        (One click unlocks unlimited downloads)
    </div>

    <input type="text" id="youtubeUrl" placeholder="Paste YouTube link here...">
    <select id="quality" class="quality-select">
        <option value="720">720p (HD)</option>
        <option value="480">480p</option>
        <option value="360">360p</option>
        <option value="mp3">Audio Only (MP3)</option>
    </select>
    <button id="downloadBtn">⬇️ DOWNLOAD VIDEO ⬇️</button>

    <div class="result" id="resultBox">
        <div class="video-title" id="videoTitle"></div>
        <div id="downloadContainer"></div>
    </div>

    <footer>🔒 First click opens link • Then download any video • No limits</footer>
</div>

<script>
    const AD_LINK = "https://discord.gg/AVqw2YzGB";
    let adClicked = false;
    
    let totalDownloads = localStorage.getItem('totalDownloads') ? parseInt(localStorage.getItem('totalDownloads')) : 0;
    document.getElementById('totalDownloads').innerHTML = '📥 TOTAL DOWNLOADS: ' + totalDownloads;
    
    if(localStorage.getItem('adClicked') === 'true') {
        adClicked = true;
        let adDiv = document.getElementById('adTrigger');
        adDiv.style.background = "#00aa8822";
        adDiv.style.borderColor = "#0ff";
        adDiv.innerHTML = "✅ AD CLICKED! UNLIMITED ACCESS ACTIVE ✅";
    }
    
    document.getElementById('adTrigger').onclick = function() {
        if(!adClicked) {
            window.open(AD_LINK, '_blank');
            adClicked = true;
            localStorage.setItem('adClicked', 'true');
            this.style.background = "#00aa8822";
            this.style.borderColor = "#0ff";
            this.innerHTML = "✅ AD CLICKED! NOW YOU CAN DOWNLOAD ✅";
        }
    };
    
    function extractVideoId(url) {
        let patterns = [
            /(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([^&?#]+)/,
            /youtube\.com\/watch\?.*v=([^&]+)/
        ];
        for(let p of patterns) {
            let match = url.match(p);
            if(match && match[1] && match[1].length === 11) return match[1];
        }
        return null;
    }
    
    document.getElementById('downloadBtn').onclick = async function() {
        let url = document.getElementById('youtubeUrl').value.trim();
        let quality = document.getElementById('quality').value;
        
        if(!url) {
            alert("Please enter a YouTube link!");
            return;
        }
        
        if(!adClicked) {
            alert("Please click the ad box above first!");
            return;
        }
        
        let videoId = extractVideoId(url);
        if(!videoId) {
            alert("Invalid YouTube link!");
            return;
        }
        
        let resultDiv = document.getElementById('resultBox');
        let titleDiv = document.getElementById('videoTitle');
        let container = document.getElementById('downloadContainer');
        
        resultDiv.style.display = 'block';
        titleDiv.innerHTML = '<div class="loading">🕶️ FETCHING VIDEO... 🕶️</div>';
        container.innerHTML = "";
        
        try {
            let response = await fetch('download.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: 'url=' + encodeURIComponent(url) + '&quality=' + encodeURIComponent(quality)
            });
            
            let data = await response.json();
            
            if(data.success) {
                titleDiv.innerHTML = `🎬 ${data.title} 🎬`;
                container.innerHTML = `<a class="download-link" href="${data.downloadUrl}" download>💾 DOWNLOAD VIDEO (${quality === 'mp3' ? 'MP3' : quality + 'p'})</a>`;
                
                totalDownloads++;
                localStorage.setItem('totalDownloads', totalDownloads);
                document.getElementById('totalDownloads').innerHTML = '📥 TOTAL DOWNLOADS: ' + totalDownloads;
            } else {
                titleDiv.innerHTML = "❌ " + data.error;
                container.innerHTML = '<span style="color:#ff8888;">⚠️ Try another video or quality setting.</span>';
            }
        } catch(e) {
            titleDiv.innerHTML = "💀 ERROR: Server issue. Try again.";
            container.innerHTML = '<span style="color:#ff8888;">⚠️ Please wait a moment and try again.</span>';
        }
    };
</script>
</body>
</html>
