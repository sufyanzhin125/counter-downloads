<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Counter Prime | Premium CFG Forum</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: radial-gradient(circle at 10% 20%, #0a0c12 0%, #03060c 100%);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: #eef2ff;
            line-height: 1.5;
            min-height: 100vh;
        }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #11151f; }
        ::-webkit-scrollbar-thumb { background: linear-gradient(135deg, #dc2626, #f97316); border-radius: 4px; }

        .navbar {
            background: rgba(10, 12, 18, 0.9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(249, 115, 22, 0.2);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo {
            font-size: 1.6rem;
            font-weight: 700;
            cursor: pointer;
            background: linear-gradient(135deg, #fff, #dc2626, #f97316);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .nav-links { display: flex; gap: 1.5rem; align-items: center; flex-wrap: wrap; }
        .nav-links a { color: #b0b7d0; text-decoration: none; font-size: 0.9rem; cursor: pointer; transition: 0.3s; }
        .nav-links a:hover { color: #f97316; }
        .inbox-badge { position: relative; }
        .badge-count {
            position: absolute;
            top: -8px;
            right: -12px;
            background: #dc2626;
            color: white;
            font-size: 0.65rem;
            font-weight: bold;
            padding: 2px 6px;
            border-radius: 20px;
            min-width: 18px;
            text-align: center;
        }
        .user-info { display: flex; align-items: center; gap: 1rem; }
        .tag {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
        }
        .tag-owner { background: #dc2626; color: white; box-shadow: 0 0 12px #dc2626; }
        .tag-prime { background: #f97316; color: white; box-shadow: 0 0 12px #f97316; }
        .tag-member { background: #2a2f42; color: #b0b7d0; }
        .tag-banned { background: #000; color: white; border: 1px solid #ff0000; }
        .glow-name { text-shadow: 0 0 8px currentColor; }
        .glow-prime { color: #fb923c; text-shadow: 0 0 12px #f97316; }

        .container { max-width: 1400px; margin: 0 auto; padding: 2rem; }
        .card {
            background: rgba(17, 21, 31, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 24px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(249, 115, 22, 0.15);
        }
        .card-title {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: #fff;
            border-left: 3px solid #f97316;
            padding-left: 1rem;
        }
        input, select, textarea {
            width: 100%;
            background: #0a0e16;
            border: 1px solid #252c3f;
            padding: 12px 16px;
            border-radius: 14px;
            color: white;
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #f97316;
            box-shadow: 0 0 0 3px rgba(249,115,22,0.2);
        }
        button {
            background: linear-gradient(135deg, #dc2626, #f97316);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        button:hover { transform: scale(0.98); opacity: 0.9; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
        .grid-3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1.5rem; }
        .product-card {
            background: #0a0e16;
            border-radius: 20px;
            padding: 1.2rem;
            text-align: center;
            border: 1px solid #1f2538;
            transition: all 0.3s;
        }
        .product-card:hover { border-color: #f97316; transform: translateY(-5px); }
        .product-price { color: #f97316; font-size: 1.5rem; font-weight: 700; margin: 0.5rem 0; }
        .cart-item { display: flex; justify-content: space-between; padding: 0.75rem 0; border-bottom: 1px solid #1f2538; }
        .post {
            background: #0a0e16;
            border-radius: 20px;
            padding: 1rem;
            margin-bottom: 1rem;
            border-left: 3px solid #f97316;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(12px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: linear-gradient(135deg, #11151f, #0f1119);
            padding: 2rem;
            border-radius: 28px;
            max-width: 500px;
            width: 90%;
            border: 1px solid rgba(249,115,22,0.5);
            max-height: 80vh;
            overflow-y: auto;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #11151f;
            border-left: 4px solid #f97316;
            padding: 1rem 1.5rem;
            border-radius: 14px;
            color: white;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .hidden { display: none; }
        .avatar-small { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; }
        .chat-container {
            height: 450px;
            overflow-y: auto;
            background: #0a0e16;
            border-radius: 20px;
            padding: 1rem;
            margin-bottom: 1rem;
        }
        .chat-message { padding: 0.75rem; border-radius: 14px; margin-bottom: 0.75rem; }
        footer { text-align: center; padding: 2rem; color: #5a637c; font-size: 0.75rem; border-top: 1px solid #1f2538; margin-top: 2rem; }
        @media (max-width: 768px) { .grid-2 { grid-template-columns: 1fr; } .navbar { flex-direction: column; text-align: center; } }
    </style>
</head>
<body>
<div id="app">
    <div class="navbar">
        <div class="logo" onclick="showDashboard()">⚡ COUNTER PRIME ⚡</div>
        <div class="nav-links">
            <a onclick="showPage('home')">Home</a>
            <a onclick="showPage('store')">Store</a>
            <a onclick="showPage('forum')">Forum</a>
            <a onclick="showPage('cart')">🛒 Cart (<span id="cartCount">0</span>)</a>
            <a onclick="showPage('inbox')" class="inbox-badge">📬 Inbox <span id="inboxBadge" class="badge-count hidden">0</span></a>
            <a onclick="showPage('members')">👥 Members</a>
            <div id="authNav"><a onclick="showLoginModal()">Login</a><a onclick="showRegisterModal()">Register</a></div>
            <div id="userNav" class="user-info hidden">
                <img id="navAvatar" class="avatar-small" src=""><span id="userTag"></span>
                <a onclick="showProfile(currentUser?.username)">Profile</a><a onclick="logout()">Logout</a>
            </div>
        </div>
    </div>
    <div class="container" id="pageContent"></div>
    <footer>Counter-Prime-CFG | Owner: sufyan | Discord: sufyancounter</footer>
</div>

<script>
    // Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyBiT6KqM3HRSDkRrWx5wOmQCgfD7TD_Jz8",
        authDomain: "counterprime-c1f95.firebaseapp.com",
        projectId: "counterprime-c1f95",
        storageBucket: "counterprime-c1f95.firebasestorage.app",
        messagingSenderId: "1012703022142",
        appId: "1:1012703022142:web:bbc9d4c71904e44b5c556f"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // Global Data
    let users = [];
    let currentUser = null;
    let cart = [];
    let posts = [];
    let messages = [];
    let userTags = {};
    let chatMessages = [];

    const products = [
        { id: 1, name: "Deadlock CFG", price: 10, description: "Full config, 1-click combo" },
        { id: 2, name: "Dota 2 CFG", price: 10, description: "Pro scripts, custom keybinds" },
        { id: 3, name: "Bundle (Both Games)", price: 18, description: "Deadlock + Dota 2 CFG" }
    ];

    // Helper Functions
    function showToast(msg, isErr = false) {
        let t = document.createElement('div');
        t.className = 'toast';
        t.style.borderLeftColor = isErr ? '#dc2626' : '#10b981';
        t.innerHTML = msg;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 3000);
    }

    function showModal(title, html) {
        let m = document.getElementById('globalModal');
        if (!m) {
            m = document.createElement('div');
            m.id = 'globalModal';
            m.className = 'modal';
            m.innerHTML = `<div class="modal-content"><div id="modalTitle" style="font-size:1.3rem; font-weight:600; margin-bottom:1rem; color:#f97316;"></div><div id="modalBody"></div><button onclick="closeModal()" style="margin-top:1rem;">Close</button></div>`;
            document.body.appendChild(m);
        }
        document.getElementById('modalTitle').innerText = title;
        document.getElementById('modalBody').innerHTML = html;
        m.style.display = 'flex';
    }

    window.closeModal = function() {
        let m = document.getElementById('globalModal');
        if (m) m.style.display = 'none';
    };

    // Load Data
    async function loadAllData() {
        try {
            let u = await db.collection('users').get();
            users = [];
            u.forEach(d => users.push({ id: d.id, ...d.data() }));
            
            let p = await db.collection('posts').orderBy('timestampMs', 'desc').get();
            posts = [];
            p.forEach(d => posts.push({ id: d.id, ...d.data() }));
            
            let m = await db.collection('messages').get();
            messages = [];
            m.forEach(d => messages.push({ id: d.id, ...d.data() }));
            
            let t = await db.collection('userTags').get();
            userTags = {};
            t.forEach(d => { userTags[d.id] = d.data(); });
            
            let c = await db.collection('chatMessages').orderBy('timestampMs', 'asc').get();
            chatMessages = [];
            c.forEach(d => chatMessages.push({ id: d.id, ...d.data() }));
            
            updateCartCount();
            updateInboxBadge();
        } catch (e) {
            console.error("Load error:", e);
        }
    }

    async function saveUser(u) { await db.collection('users').doc(u.id).set(u); }
    async function savePost(p) { let r = await db.collection('posts').add(p); p.id = r.id; return p; }
    async function deletePostById(id) { await db.collection('posts').doc(id).delete(); }
    async function saveMessage(m) { let r = await db.collection('messages').add(m); m.id = r.id; return m; }
    async function saveChatMessage(m) { let r = await db.collection('chatMessages').add(m); m.id = r.id; return m; }

    function updateCartCount() {
        let e = document.getElementById('cartCount');
        if (e) e.innerText = cart.reduce((s, i) => s + i.quantity, 0);
    }

    function updateInboxBadge() {
        let b = document.getElementById('inboxBadge');
        if (!b) return;
        if (currentUser) {
            let c = messages.filter(m => m.to === currentUser.username && !m.read).length;
            if (c > 0) {
                b.innerText = c;
                b.classList.remove('hidden');
            } else {
                b.classList.add('hidden');
            }
        } else {
            b.classList.add('hidden');
        }
    }

    function getUserTagDisplay(u) {
        if (!u) return '<span class="tag tag-member">MEMBER</span>';
        if (u.isBanned) return '<span class="tag tag-banned">BANNED</span>';
        if (u.isOwner) return '<span class="tag tag-owner">OWNER</span>';
        let d = userTags[u.username];
        if (d) {
            return `<span class="tag tag-prime">${d.tag.toUpperCase()}</span>`;
        }
        return '<span class="tag tag-member">MEMBER</span>';
    }

    // Auth Functions (NO FORGOT PASSWORD)
    window.showRegisterModal = function() {
        showModal('📝 Create Account', 
            `<input id="regU" placeholder="Username">
             <input id="regE" placeholder="Email">
             <input id="regP" type="password" placeholder="Password (min 4)">
             <button onclick="register()">Create Account</button>
             <p><a onclick="closeModal();showLoginModal();">Already have account? Login</a></p>`
        );
    };

    window.register = async function() {
        let u = document.getElementById('regU').value.trim();
        let e = document.getElementById('regE').value.trim();
        let p = document.getElementById('regP').value;
        
        if (!u || !e || !p) { showToast('All fields required', true); return; }
        if (!/^[^\s@]+@([^\s@]+\.)+[^\s@]+$/.test(e)) { showToast('Valid email required', true); return; }
        if (users.find(x => x.username === u)) { showToast('Username taken', true); return; }
        if (users.find(x => x.email === e)) { showToast('Email registered', true); return; }
        if (p.length < 4) { showToast('Password min 4 chars', true); return; }
        
        let isOwner = (u === 'sufyan');
        let nu = {
            id: Date.now().toString(),
            username: u,
            email: e,
            password: p,
            isOwner: isOwner,
            isBanned: false,
            registeredAt: new Date().toISOString(),
            avatar: null
        };
        
        users.push(nu);
        await saveUser(nu);
        currentUser = nu;
        localStorage.setItem('currentUser', JSON.stringify({ id: nu.id, username: nu.username }));
        updateNav();
        closeModal();
        showToast(`Welcome ${u}!`);
        showPage('home');
    };

    window.showLoginModal = function() {
        showModal('🔐 Login',
            `<input id="loginU" placeholder="Username">
             <input id="loginP" type="password" placeholder="Password">
             <button onclick="login()">Login</button>
             <p><a onclick="closeModal();showRegisterModal();">Create Account</a></p>`
        );
    };

    window.login = async function() {
        let u = document.getElementById('loginU').value;
        let p = document.getElementById('loginP').value;
        let user = users.find(x => x.username === u);
        
        if (!user) { showToast('Username not found', true); return; }
        if (user.password !== p) { showToast('Incorrect password', true); return; }
        if (user.isBanned) { showToast('Account banned', true); return; }
        
        currentUser = user;
        localStorage.setItem('currentUser', JSON.stringify({ id: user.id, username: user.username }));
        updateNav();
        closeModal();
        showToast(`Welcome ${u}!`);
        showPage('home');
    };

    function updateNav() {
        if (currentUser && !currentUser.isBanned) {
            document.getElementById('authNav').classList.add('hidden');
            document.getElementById('userNav').classList.remove('hidden');
            let a = currentUser.avatar || `https://ui-avatars.com/api/?background=f97316&color=fff&name=${encodeURIComponent(currentUser.username)}`;
            document.getElementById('navAvatar').src = a;
            document.getElementById('userTag').innerHTML = `${currentUser.username} ${getUserTagDisplay(currentUser)}`;
        } else if (currentUser && currentUser.isBanned) {
            logout();
            showToast('Account banned', true);
        } else {
            document.getElementById('authNav').classList.remove('hidden');
            document.getElementById('userNav').classList.add('hidden');
        }
        updateInboxBadge();
    }

    function logout() {
        currentUser = null;
        localStorage.removeItem('currentUser');
        updateNav();
        updateInboxBadge();
        showToast('Logged out');
        showPage('home');
    }

    // Page Rendering (Simplified)
    function showPage(page) {
        let c = document.getElementById('pageContent');
        if (page === 'home') renderHome(c);
        else if (page === 'store') renderStore(c);
        else if (page === 'forum') renderForum(c);
        else if (page === 'cart') renderCart(c);
        else if (page === 'inbox') renderInbox(c);
        else if (page === 'members') renderMembers(c);
    }

    function renderHome(container) {
        container.innerHTML = `
            <div class="card">
                <div class="card-title">⚡ Welcome to Counter Prime</div>
                <p>Professional CFG Store</p>
                <button onclick="showPage('store')">Store</button>
                <button onclick="showPage('forum')">My Orders</button>
            </div>
            <div class="card">
                <div class="card-title">💬 Live Chat</div>
                <div id="homeChat" class="chat-container" style="height:300px;"></div>
                <div style="display:flex;">
                    <input type="text" id="homeChatInput" placeholder="Message..." style="flex:1;">
                    <button onclick="sendHomeChat()">Send</button>
                </div>
            </div>
        `;
        renderHomeChat();
        setInterval(renderHomeChat, 3000);
    }

    function renderHomeChat() {
        let c = document.getElementById('homeChat');
        if (!c) return;
        c.innerHTML = chatMessages.slice(-20).map(m => {
            return `<div><strong>${m.username}</strong> <span style="font-size:0.65rem;">${m.time}</span><br>${m.message}</div>`;
        }).join('');
        c.scrollTop = c.scrollHeight;
    }

    window.sendHomeChat = async function() {
        if (!currentUser) { showToast('Login first', true); return; }
        let msg = document.getElementById('homeChatInput').value.trim();
        if (!msg) return;
        let m = {
            username: currentUser.username,
            message: msg,
            time: new Date().toLocaleTimeString(),
            timestampMs: Date.now()
        };
        let s = await saveChatMessage(m);
        chatMessages.push(s);
        document.getElementById('homeChatInput').value = '';
        renderHomeChat();
    };

    function renderStore(container) {
        if (!currentUser) { container.innerHTML = '<div class="card"><p>Please login to view store</p></div>'; return; }
        container.innerHTML = `
            <div class="card">
                <div class="card-title">🛒 Store</div>
                <div class="grid-3" id="productsGrid"></div>
            </div>
        `;
        document.getElementById('productsGrid').innerHTML = products.map(p => `
            <div class="product-card">
                <h3>${p.name}</h3>
                <div class="product-price">$${p.price}</div>
                <p>${p.description}</p>
                <button onclick="addToCart(${p.id})">Add to Cart</button>
            </div>
        `).join('');
    }

    window.addToCart = function(id) {
        let p = products.find(p => p.id === id);
        let e = cart.find(i => i.id === id);
        if (e) e.quantity++;
        else cart.push({ ...p, quantity: 1 });
        updateCartCount();
        showToast(`${p.name} added to cart`);
    };

    function renderCart(container) {
        if (!currentUser) { container.innerHTML = '<div class="card"><p>Please login</p></div>'; return; }
        if (!cart.length) {
            container.innerHTML = '<div class="card"><div class="card-title">Cart Empty</div><button onclick="showPage(\'store\')">Go to Store</button></div>';
            return;
        }
        let total = 0;
        let items = cart.map(i => {
            total += i.price * i.quantity;
            return `<div class="cart-item"><span>${i.name} x${i.quantity}</span><span>$${i.price * i.quantity}</span><button onclick="removeFromCart(${i.id})">Remove</button></div>`;
        }).join('');
        container.innerHTML = `
            <div class="card">
                <div class="card-title">🛒 Cart</div>
                ${items}
                <div class="cart-item" style="border-top:2px solid #f97316;"><span>Total</span><span>$${total}</span></div>
                <button onclick="showPage('forum')">Checkout</button>
            </div>
        `;
    }

    window.removeFromCart = function(id) {
        cart = cart.filter(i => i.id !== id);
        updateCartCount();
        showPage('cart');
    };

    function renderForum(container) {
        if (!currentUser) { container.innerHTML = '<div class="card"><p>Please login</p></div>'; return; }
        container.innerHTML = `
            <div class="card">
                <div class="card-title">📦 My Orders</div>
                <button onclick="toggleNewPost()">+ New Order Post</button>
                <div id="newPostForm" class="hidden">
                    <textarea id="postContent" rows="3" placeholder="Payment details, transaction ID..."></textarea>
                    <button onclick="submitOrder()">Submit Payment Proof</button>
                </div>
                <div id="forumPosts"></div>
            </div>
        `;
        renderUserPosts();
    }

    function renderUserPosts() {
        let c = document.getElementById('forumPosts');
        if (!c) return;
        let my = posts.filter(p => p.userId === currentUser?.id);
        if (!my.length) { c.innerHTML = '<p>No orders yet.</p>'; return; }
        c.innerHTML = my.map(p => `
            <div class="post">
                <div><strong>${p.username}</strong> ${getUserTagDisplay(users.find(u => u.username === p.username) || {})} | ${p.timestamp}</div>
                <div>${p.content}</div>
                ${p.image ? `<img src="${p.image}" style="max-width:100%;">` : ''}
            </div>
        `).join('');
    }

    window.toggleNewPost = function() {
        let f = document.getElementById('newPostForm');
        if (f) f.classList.toggle('hidden');
    };

    window.submitOrder = async function() {
        let c = document.getElementById('postContent').value.trim();
        if (!c) { showToast('Enter details', true); return; }
        let total = cart.reduce((s, i) => s + (i.price * i.quantity), 0);
        let details = cart.map(i => `${i.name} x${i.quantity}`).join(', ');
        
        let p = {
            username: currentUser.username,
            userId: currentUser.id,
            content: `Order: ${details}\nTotal: $${total}\n\n${c}`,
            image: null,
            timestamp: new Date().toLocaleString(),
            timestampMs: Date.now(),
            replies: [],
            status: 'pending'
        };
        let s = await savePost(p);
        posts.unshift(s);
        
        // Send message to owner
        let m = {
            from: currentUser.username,
            to: 'sufyan',
            content: `NEW ORDER!\n${details}\nTotal: $${total}\n\n${c}`,
            timestamp: new Date().toLocaleString(),
            read: false
        };
        await saveMessage(m);
        
        cart = [];
        updateCartCount();
        document.getElementById('postContent').value = '';
        document.getElementById('newPostForm').classList.add('hidden');
        renderUserPosts();
        updateInboxBadge();
        showToast('Order placed!');
    };

    function renderInbox(container) {
        if (!currentUser) { container.innerHTML = '<div class="card"><p>Please login</p></div>'; return; }
        let msgs = messages.filter(m => m.to === currentUser.username || m.from === currentUser.username);
        if (!msgs.length) {
            container.innerHTML = '<div class="card"><div class="card-title">Inbox</div><p>No messages</p></div>';
            return;
        }
        container.innerHTML = `
            <div class="card">
                <div class="card-title">📬 Inbox</div>
                <div id="inboxList">${msgs.map(m => `<div><strong>${m.from === currentUser.username ? 'To: ' + m.to : 'From: ' + m.from}</strong><br>${m.content.substring(0,80)}<br><small>${m.timestamp}</small></div><hr>`).join('')}</div>
            </div>
        `;
    }

    function renderMembers(container) {
        if (!currentUser) { container.innerHTML = '<div class="card"><p>Please login</p></div>'; return; }
        container.innerHTML = `
            <div class="card">
                <div class="card-title">👥 Members</div>
                <div id="membersList" class="grid-3">${users.filter(u => !u.isBanned).map(u => `<div><strong>${u.username}</strong>${getUserTagDisplay(u)}</div>`).join('')}</div>
            </div>
        `;
    }

    window.showDashboard = function() {
        if (!currentUser?.isOwner) { showPage('home'); return; }
        showModal('Admin Dashboard', `<div><h3>Welcome ${currentUser.username}</h3><p>Users: ${users.length}</p><p>Orders: ${posts.length}</p><button onclick="closeModal()">Close</button></div>`);
    };

    window.showProfile = function(u) {
        let user = users.find(x => x.username === u);
        if (!user) return;
        showModal(`${user.username}'s Profile`, `<div><strong>Username:</strong> ${user.username}<br><strong>Joined:</strong> ${new Date(user.registeredAt).toLocaleDateString()}<br>${getUserTagDisplay(user)}</div>`);
    };

    async function init() {
        await loadAllData();
        let saved = localStorage.getItem('currentUser');
        if (saved) {
            let d = JSON.parse(saved);
            let u = users.find(x => x.id === d.id);
            if (u && !u.isBanned) currentUser = u;
        }
        updateNav();
        showPage('home');
        setInterval(async () => { await loadAllData(); updateInboxBadge(); }, 10000);
    }

    init();
</script>
</body>
</html>
